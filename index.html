<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKP - Serwer Kolejowy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@17..18,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2ecc71;
            --google-blue: #1a73e8;
            --glass: rgba(255, 255, 255, 0.85); 
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #202124;
            --text-sub: #5f6368;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Google Sans', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* Wymuszamy białe tło pod spodem */
            background-color: #ffffff; 
            color: var(--text-main);
            overflow: hidden;
        }

        /* WARSTWA TŁA (background.png) */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center right; /* Szyny po prawej stronie */
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Kontener główny - wyrównanie do lewej */
        .main-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 10%; /* Odstęp od lewej krawędzi */
        }

        /* Karta z informacjami */
        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 12px 40px rgba(0,0,0,0.06);
            animation: slideInLeft 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h1 {
            font-size: 3.2rem;
            margin: 0;
            font-weight: 500;
            letter-spacing: -0.5px;
        }

        .tagline {
            color: var(--google-blue);
            font-size: 1.1rem;
            margin-bottom: 24px;
            font-weight: 500;
        }

        p {
            line-height: 1.6;
            color: var(--text-sub);
            font-size: 1.05rem;
        }

        /* Animacja torów pod tekstem */
        .rail-anim {
            width: 100%;
            height: 2px;
            background: #f1f3f4;
            margin: 32px 0;
            position: relative;
        }

        .train {
            position: absolute;
            top: -15px;
            left: 0;
            font-size: 1.4rem;
            animation: driveTrain 6s linear infinite;
        }

        /* Przyciski */
        .buttons {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 100px; /* Styl Google "Pill" */
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s ease;
            font-size: 0.95rem;
            display: inline-block;
            text-align: center;
        }

        .btn-blue {
            background: var(--google-blue);
            color: white;
        }

        .btn-outline {
            background: transparent;
            color: var(--google-blue);
            border: 1px solid #dadce0;
        }

        .btn:hover {
            box-shadow: 0 1px 3px rgba(60,64,67, 0.3), 0 4px 8px 3px rgba(60,64,67, 0.15);
            filter: brightness(1.05);
        }

        /* Animacje */
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-60px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes driveTrain {
            0% { left: -10%; }
            100% { left: 100%; }
        }

        /* Programistyczny detal */
        .version-info {
            margin-top: 32px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #bdc1c6;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-container">
        <div class="card">
            <h1>PPKP</h1>
            <div class="tagline">Polska Państwowa Kolej Projektowa</div>

            <p>Dołącz do profesjonalnego serwera kolejowego Minecraft. Tworzymy realistyczne składy i infrastrukturę na silniku Forge.</p>
            
            <div class="rail-anim">
                <div class="train">🚂</div>
            </div>

            <div class="buttons">
                <a href="#" class="btn btn-blue">Pobierz Modpack</a>
                <a href="https://discord.gg/KYSZdvXafS" target="_blank" class="btn btn-outline">Discord</a>
            </div>

            <div class="version-info">
                python@ppkp:~$ ./start_server.sh --region=dolnoslaskie
            </div>
        </div>
    </div>

</body>
</html>
