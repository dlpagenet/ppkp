<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKP - Serwer Kolejowy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2ecc71;
            --glass: rgba(0, 0, 0, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: white;
            background-color: #111; /* Bardzo ciemny szary, żeby nie było czystej czerni */
            overflow-x: hidden;
        }

        /* WARSTWA TŁA */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* Używamy ./ aby wskazać bieżący katalog */
            background-image: url('./background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            filter: brightness(0.6);
            transform: scale(1.02);
        }

        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px;
            max-width: 700px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            margin: 0;
            background: linear-gradient(to bottom, #fff, #2ecc71);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            color: #2ecc71;
            margin-bottom: 25px;
            font-size: 0.9rem;
        }

        /* Animacja torów i pociągu */
        .railway {
            height: 4px;
            background: rgba(255,255,255,0.1);
            margin: 30px 0;
            position: relative;
            border-radius: 2px;
        }

        .train {
            position: absolute;
            top: -20px;
            font-size: 1.8rem;
            animation: drive 10s linear infinite;
        }

        .buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            font-size: 0.9rem;
        }

        .btn-main { background: #2ecc71; color: #000; }
        .btn-sec { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid var(--glass-border); }

        .btn:hover { transform: scale(1.05); filter: brightness(1.1); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes drive {
            0% { left: -10%; }
            100% { left: 110%; }
        }

        .footer {
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-container">
        <div class="card">
            <h1>PPKP</h1>
            <div class="tagline">Polska Państwowa Kolej Projektowa</div>

            <p>Witaj na stronie serwera PPKP. Tworzymy pociągi z pasją na modach Forge.</p>
            
            <div class="railway">
                <div class="train">🚂</div>
            </div>

            <div class="buttons">
                <a href="#" class="btn btn-main">Pobierz Modpack</a>
                <a href="#" class="btn btn-sec">Discord</a>
            </div>

            <div class="footer">
                Python dev detected. Build version: 1.0.4
            </div>
        </div>
    </div>

</body>
</html>
</body>
</html>
