<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKP - Serwer Kolejowy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:opsz,wght@17..18,500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2ecc71;
            /* Ciemniejszy tekst i szkło, bo tło obrazka jest jasne */
            --glass: rgba(255, 255, 255, 0.8); 
            --glass-border: rgba(0, 0, 0, 0.1);
            --text-color: #202124;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Google Sans', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            /* WYMUSZONE BIAŁE TŁO - aby pasowało do background.png */
            background-color: #ffffff; 
            color: var(--text-color);
            overflow: hidden;
        }

        /* WARSTWA TŁA */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center right; /* Przesunięcie szyn do prawej */
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Kontener przesunięty do lewej */
        .main-container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Wszystko do lewej */
            padding-left: 8%; /* Odstęp od krawędzi ekranu */
        }

        /* Karta z informacjami */
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            animation: slideIn 0.8s ease-out;
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            color: #1a1a1a;
            font-weight: 500;
        }

        .tagline {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        p {
            line-height: 1.6;
            color: #5f6368;
        }

        /* Mały pociąg na dole karty */
        .railway-mini {
            width: 100%;
            height: 2px;
            background: #eee;
            margin: 30px 0;
            position: relative;
        }

        .train {
            position: absolute;
            top: -15px;
            left: 0;
            font-size: 1.2rem;
            animation: drive 5s linear infinite;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 500;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .btn-main {
            background: #1a73e8; /* Niebieski styl Google */
            color: white;
        }

        .btn-sec {
            background: #f1f3f4;
            color: #3c4043;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes drive {
            0% { left: 0%; }
            100% { left: 90%; }
        }

        /* Terminal info dla programisty */
        .dev-tag {
            margin-top: 25px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: #9aa0a6;
        }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-container">
        <div class="card">
            <h1>PPKP</h1>
            <div class="tagline">Serwer Kolejowy Minecraft</div>

            <p>Budujemy najbardziej zaawansowane linie kolejowe na Dolnym Śląsku i nie tylko. Dołącz do nas na Forge.</p>
            
            <div class="railway-mini">
                <div class="train">🚂</div>
            </div>

            <div class="buttons">
                <a href="#" class="btn btn-main">Zagraj teraz</a>
                <a href="#" class="btn btn-sec">Discord</a>
            </div>

            <div class="dev-tag">
                $ python3 server_check.py --location="Bardo"
            </div>
        </div>
    </div>

</body>
</html>
