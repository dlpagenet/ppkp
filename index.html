<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PPKP - Serwer Kolejowy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        /* Reset i ustawienia podstawowe */
        :root {
            --primary: #2ecc71; /* Zielony kolejowy */
            --glass: rgba(0, 0, 0, 0.4); /* Ciemniejsze szkło dla lepszego kontrastu */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            color: white;
            background-color: #000; /* Kolor zapasowy */
            overflow-x: hidden;
        }

        /* WARSTWA TŁA (background.png) */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            /* WAŻNE: Plik background.png musi być w tym samym folderze co index.html */
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: -1;
            filter: brightness(0.6) contrast(1.1);
            transform: scale(1.05); /* Zapobiega białym krawędziom przy parallax */
        }

        /* Główny kontener */
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: radial-gradient(circle, rgba(0,0,0,0) 0%, rgba(0,0,0,0.6) 100%);
        }

        /* Nowoczesna karta (Glassmorphism) */
        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px;
            max-width: 750px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 1.2s ease-in-out;
        }

        h1 {
            font-size: clamp(2.5rem, 10vw, 4.5rem);
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(135deg, #ffffff 0%, #2ecc71 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-family: 'JetBrains Mono', monospace;
            color: #2ecc71;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        /* Animacja torów */
        .railway-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            margin: 25px 0;
            position: relative;
            overflow: hidden;
        }

        .train-icon {
            position: absolute;
            font-size: 1.5rem;
            top: -15px;
            animation: trainDrive 8s linear infinite;
        }

        /* Sekcja przycisków */
        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 35px;
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: #2ecc71;
            color: #000;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(46, 204, 113, 0.3);
        }

        /* Animacje */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes trainDrive {
            0% { left: -50px; }
            100% { left: 105%; }
        }

        /* Opis programistyczny */
        .footer-info {
            margin-top: 40px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: #888;
        }

        span.code-green { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="bg-layer"></div>

    <div class="main-container">
        <div class="card">
            <h1>PPKP</h1>
            <div class="tagline">Polska Państwowa Kolej Projektowa</div>

            <div class="railway-line">
                <div class="train-icon">🚂</div>
            </div>

            <p>Budujemy przyszłość polskiej kolei w świecie Minecraft. Dołącz do serwera opartego na silniku Forge i twórz z nami niesamowite konstrukcje.</p>

            <div class="buttons">
                <a href="#" class="btn btn-primary">Pobierz Modpack</a>
                <a href="#" class="btn btn-secondary">Discord</a>
                <a href="#" class="btn btn-secondary">Mapa Online</a>
            </div>

            <div class="footer-info">
                > status: <span class="code-green">online</span><br>
                > environment: <span class="code-green">Forge Modded</span><br>
                > location: <span class="code-green">Bardo / Wrocław</span>
            </div>
        </div>
    </div>

</body>
</html>
